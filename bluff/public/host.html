<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bluff — Host</title>
  <link rel="stylesheet" href="/shared/theme.css" />
  <link rel="stylesheet" href="/shared/lobby.css" />
  <link rel="stylesheet" href="host.css" />
  <script type="module" src="/shared/boot.js"></script>
</head>
<body>
  <button class="mute-btn" id="muteBtn" title="Mute">🔊</button>

  <!-- LOBBY -->
  <section id="screen-lobby" class="screen">
    <header class="brand">
      <h1 class="display"><span class="title-gradient">BLUFF</span></h1>
      <p class="tagline">Lie convincingly. Spot the truth. 🤥</p>
    </header>
    <div id="preStart" class="center-stack">
      <button class="btn cyan big-start" id="createBtn">Start a Game ▶</button>
    </div>
    <div id="lobbyBody" class="lobby hidden">
      <div class="join-panel glass">
        <h2>Join on your phone</h2>
        <div class="qr-wrap"><img id="qrImg" alt="Join QR code" /></div>
        <div class="join-info">
          <div class="join-url" id="joinUrl"></div>
          <div class="room-code"><span class="rc-label">ROOM CODE</span><span class="rc-code" id="roomCode">----</span></div>
        </div>
      </div>
      <div class="players-panel">
        <div class="players-head">
          <h2>Players <span class="count-badge" id="playerCount">0</span></h2>
          <button class="btn green" id="startGameBtn" disabled>Start Round ▶</button>
        </div>
        <div>
          <div class="round-badge" style="margin-bottom:.6rem;display:inline-block">Pick a pack</div>
          <div class="packs" id="packs"></div>
        </div>
        <div class="player-grid" id="lobbyPlayers"></div>
        <p class="empty-hint" id="emptyHint">Waiting for players to join…</p>
      </div>
    </div>
  </section>

  <!-- LIE phase -->
  <section id="screen-lie" class="screen hidden">
    <div class="round-badge" id="lieRound">Round 1</div>
    <div class="center-stack" style="gap:2rem">
      <div class="game-q" id="lieQ"></div>
      <p class="status-line">✍️ Everyone is writing a <b>convincing lie</b>…</p>
      <div class="progress"><span id="lieProg">0 / 0</span> answers in</div>
      <div class="timer-wrap" id="lieTimer">
        <svg viewBox="0 0 120 120" class="timer-ring"><circle cx="60" cy="60" r="52" class="ring-bg"/><circle cx="60" cy="60" r="52" class="ring-fg" id="lieRing"/></svg>
        <div class="timer-text" id="lieTime">45</div>
      </div>
    </div>
  </section>

  <!-- VOTE phase -->
  <section id="screen-vote" class="screen hidden">
    <div class="round-badge" id="voteRound">Round 1</div>
    <div class="game-q" id="voteQ" style="margin-bottom:1rem"></div>
    <div class="opt-list" id="voteOpts"></div>
    <p class="status-line" style="margin-top:1rem">📱 Vote for the <b>real</b> answer on your phones</p>
    <div class="progress"><span id="voteProg">0 / 0</span> voted</div>
  </section>

  <!-- REVEAL phase -->
  <section id="screen-reveal" class="screen hidden">
    <div class="round-badge">The truth…</div>
    <div class="game-q" id="revealQ" style="margin-bottom:1rem"></div>
    <div class="opt-list" id="revealOpts"></div>
  </section>

  <!-- RESULTS -->
  <section id="screen-results" class="screen hidden">
    <h1 class="display results-title"><span class="title-gradient">RESULTS</span></h1>
    <div class="scoreboard" id="scoreboard"></div>
    <button class="btn cyan" id="playAgainBtn" style="margin-top:1.4rem">Play Again ↻</button>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="host.js"></script>
</body>
</html>
