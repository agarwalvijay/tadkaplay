name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Avoid overlapping deploys
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORT="${{ secrets.SSH_PORT }}"; PORT="${PORT:-22}"
          ssh-keyscan -p "$PORT" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync app to server
        run: |
          PORT="${{ secrets.SSH_PORT }}"; PORT="${PORT:-22}"
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '.claude' \
            --exclude '*.log' \
            -e "ssh -i ~/.ssh/id_deploy -p $PORT -o StrictHostKeyChecking=yes" \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Install deps & reload pm2
        run: |
          PORT="${{ secrets.SSH_PORT }}"; PORT="${PORT:-22}"
          ssh -i ~/.ssh/id_deploy -p "$PORT" -o StrictHostKeyChecking=yes \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" bash -lc '
              set -e
              # load nvm so npm/pm2 are on PATH in this non-interactive shell
              export NVM_DIR="$HOME/.nvm"
              [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
              cd "${{ secrets.DEPLOY_PATH }}"
              npm ci --omit=dev
              ( cd wordcombos && npm ci --omit=dev )
              pm2 reload ecosystem.config.cjs --update-env || pm2 start ecosystem.config.cjs
              pm2 save
            '
