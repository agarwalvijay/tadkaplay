<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naam Place Animal Cheez — Host</title>
  <link rel="stylesheet" href="/shared/theme.css" />
  <link rel="stylesheet" href="/shared/lobby.css" />
  <link rel="stylesheet" href="skin.css" />
  <link rel="stylesheet" href="host.css" />
  <script type="module" src="/shared/boot.js"></script>
</head>
<body>
  <a class="home-btn" href="/" title="Tadka Play home" aria-label="Home">🏠</a>
  <button class="mute-btn" id="muteBtn" title="Mute">🔊</button>

  <!-- LOBBY -->
  <section id="screen-lobby" class="screen">
    <header class="brand">
      <h1 class="display npac-title"><span class="title-gradient">NAAM PLACE ANIMAL CHEEZ</span></h1>
      <p class="tagline">Pick a letter. Race to fill the blanks. 📝</p>
    </header>
    <div id="preStart" class="center-stack">
      <button class="btn cyan big-start" id="createBtn">Start a Game ▶</button>
    </div>
    <div id="lobbyBody" class="lobby hidden">
      <div class="join-panel glass">
        <h2>Join on your phone</h2>
        <div class="qr-wrap"><img id="qrImg" alt="Join QR code" /></div>
        <div class="join-info">
          <div class="join-url" id="joinUrl"></div>
          <div class="room-code"><span class="rc-label">ROOM CODE</span><span class="rc-code" id="roomCode">----</span></div>
        </div>
      </div>
      <div class="players-panel">
        <div class="players-head">
          <h2>Players <span class="count-badge" id="playerCount">0</span></h2>
          <button class="btn green" id="startGameBtn" disabled>Start ▶</button>
        </div>
        <div>
          <div class="round-badge" style="margin-bottom:.6rem;display:inline-block">Pick categories</div>
          <div class="packs" id="packs"></div>
        </div>
        <div class="player-grid" id="lobbyPlayers"></div>
        <p class="empty-hint" id="emptyHint">Waiting for players to join…</p>
      </div>
    </div>
  </section>

  <!-- ROUND -->
  <section id="screen-round" class="screen hidden">
    <div class="round-badge" id="roundBadge">Round 1</div>
    <div class="letter-wrap">
      <div class="letter-label">Your letter is</div>
      <div class="big-letter" id="bigLetter">A</div>
    </div>
    <div class="cat-chips" id="catChips"></div>
    <p class="status-line" id="roundStatus">✍️ Fill them all in on your phones!</p>
    <div class="round-foot">
      <div class="progress"><span id="roundProg">0 / 0</span>&nbsp;done</div>
      <div class="timer-wrap" id="roundTimer">
        <svg viewBox="0 0 120 120" class="timer-ring"><circle cx="60" cy="60" r="52" class="ring-bg"/><circle cx="60" cy="60" r="52" class="ring-fg" id="roundRing"/></svg>
        <div class="timer-text" id="roundTime">90</div>
      </div>
    </div>
  </section>

  <!-- REVEAL (scoresheet) -->
  <section id="screen-reveal" class="screen hidden">
    <div class="round-badge">Letter <b id="revealLetter">A</b> — the scores</div>
    <div class="sheet-wrap"><table class="sheet" id="sheet"></table></div>
  </section>

  <!-- RESULTS -->
  <section id="screen-results" class="screen hidden">
    <h1 class="display results-title"><span class="title-gradient">RESULTS</span></h1>
    <div class="scoreboard" id="scoreboard"></div>
    <button class="btn cyan" id="playAgainBtn" style="margin-top:1.4rem">Play Again ↻</button>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="host.js"></script>
</body>
</html>
