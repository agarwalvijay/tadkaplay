<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tadka Play — desi party games</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='88'%3E%F0%9F%8C%B6%EF%B8%8F%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Khand:wght@500;600;700&family=Baloo+2:wght@600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="landing.css" />
  <script type="module" src="/shared/boot.js"></script>
</head>
<body>
  <!-- atmospheric background layers -->
  <div class="grid-floor" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="floaters" id="floaters" aria-hidden="true"></div>

  <header class="marquee">
    <p class="kicker" id="kicker"></p>
    <h1 class="hero-h1"><img class="hero-img" src="/hero.jpg" alt="Tadka Play" /></h1>
    <p class="subtitle" id="subtitle"></p>
  </header>

  <main class="grid" id="grid"></main>

  <footer class="foot">
    <div>
      <span id="footCount"></span>
      <span class="foot-sep">•</span>
      <span class="domain">tadkaplay.com</span>
      <span class="foot-sep">•</span>
      <span>made with extra 🌶️</span>
    </div>
    <div class="foot-legal">
      <a href="/privacy">Privacy</a>
      <span class="foot-sep">•</span>
      <a href="/terms">Terms</a>
    </div>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
