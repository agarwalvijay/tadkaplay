<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Combos — Host</title>
  <link rel="stylesheet" href="shared.css" />
  <link rel="stylesheet" href="host.css" />
</head>
<body>
  <button class="mute-btn" id="muteBtn" title="Mute">🔊</button>

  <!-- ============ START / LOBBY ============ -->
  <section id="screen-lobby" class="screen">
    <header class="brand">
      <h1 class="display"><span class="title-gradient">WORD&nbsp;COMBOS</span></h1>
      <p class="tagline">Find the words. Beat your friends. 🔤⚡</p>
    </header>

    <div id="preStart" class="center-stack">
      <button class="btn cyan big-start" id="createBtn">Start a Game ▶</button>
    </div>

    <div id="lobbyBody" class="lobby hidden">
      <div class="join-panel glass">
        <h2>Join on your phone</h2>
        <div class="qr-wrap"><img id="qrImg" alt="Join QR code" /></div>
        <div class="join-info">
          <div class="join-url" id="joinUrl"></div>
          <div class="room-code">
            <span class="rc-label">ROOM CODE</span>
            <span class="rc-code" id="roomCode">----</span>
          </div>
        </div>
      </div>

      <div class="players-panel">
        <div class="players-head">
          <h2>Players <span class="count-badge" id="playerCount">0</span></h2>
          <button class="btn green" id="startGameBtn" disabled>Start Round ▶</button>
        </div>
        <div class="player-grid" id="lobbyPlayers"></div>
        <p class="empty-hint" id="emptyHint">Waiting for players to join…</p>
      </div>
    </div>
  </section>

  <!-- ============ COUNTDOWN ============ -->
  <section id="screen-countdown" class="screen hidden">
    <div class="count-number display" id="countNumber">3</div>
  </section>

  <!-- ============ PLAYING ============ -->
  <section id="screen-play" class="screen hidden">
    <div class="play-top">
      <div class="timer-wrap">
        <svg viewBox="0 0 120 120" class="timer-ring">
          <circle cx="60" cy="60" r="52" class="ring-bg" />
          <circle cx="60" cy="60" r="52" class="ring-fg" id="ringFg" />
        </svg>
        <div class="timer-text" id="timerText">90</div>
      </div>
      <div class="play-title">
        <h2 class="display"><span class="title-gradient">WORD COMBOS</span></h2>
        <div class="pill" id="possiblePill">… possible words</div>
      </div>
      <div class="grid-preview" id="gridPreview"></div>
    </div>
    <div class="leaderboard-live" id="liveBoard"></div>
    <div class="word-feed" id="wordFeed"></div>
  </section>

  <!-- ============ RESULTS ============ -->
  <section id="screen-results" class="screen hidden">
    <h1 class="display results-title"><span class="title-gradient">RESULTS</span></h1>
    <div class="podium" id="podium"></div>
    <div class="awards" id="awards"></div>
    <div class="grid-fact" id="gridFact"></div>
    <button class="btn cyan" id="playAgainBtn">Play Again ↻</button>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="host.js"></script>
</body>
</html>
