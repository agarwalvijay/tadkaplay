<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Word Combos</title>
  <link rel="stylesheet" href="/shared/theme.css" />
  <link rel="stylesheet" href="player.css" />
  <script type="module" src="/shared/boot.js"></script>
</head>
<body class="player-body">
  <button class="mute-btn" id="muteBtn" title="Mute">🔊</button>

  <!-- ============ JOIN ============ -->
  <section id="screen-join" class="pscreen">
    <h1 class="display join-logo"><span class="title-gradient">WORD<br>COMBOS</span></h1>

    <div class="join-card glass">
      <label class="field">
        <span>Room Code</span>
        <input id="codeInput" maxlength="4" autocomplete="off" autocapitalize="characters" placeholder="ABCD" />
      </label>

      <div class="field">
        <span>Your Name</span>
        <div class="name-row">
          <input id="nameInput" maxlength="16" autocomplete="off" placeholder="Tap to name yourself" />
          <button class="dice-btn" id="randomName" title="Random name">🎲</button>
        </div>
      </div>

      <div class="field">
        <span>Pick Your Vibe</span>
        <div class="avatar-preview">
          <div class="avatar big" id="avatarPreview">🦊</div>
        </div>
        <div class="picker">
          <div class="emoji-grid" id="emojiGrid"></div>
          <div class="color-row" id="colorRow"></div>
        </div>
      </div>

      <button class="btn green join-btn" id="joinBtn">Join Game ▶</button>
      <p class="join-error hidden" id="joinError"></p>
    </div>
  </section>

  <!-- ============ WAITING ============ -->
  <section id="screen-wait" class="pscreen hidden">
    <div class="wait-card glass">
      <div class="avatar big" id="waitAvatar">🦊</div>
      <h2 id="waitName">You're in!</h2>
      <p class="wait-sub">Get ready to find some words…</p>
      <button class="btn green ready-btn" id="readyBtn">I'm Ready! ✋</button>
      <div class="lobby-mini" id="lobbyMini"></div>
      <p class="spectator-note hidden" id="spectatorNote">A round is in progress — you'll watch this one and play the next! 👀</p>
    </div>
  </section>

  <!-- ============ COUNTDOWN ============ -->
  <section id="screen-countdown" class="pscreen hidden">
    <div class="count-number display" id="pCountNumber">3</div>
  </section>

  <!-- ============ PLAY ============ -->
  <section id="screen-play" class="pscreen hidden">
    <div class="hud">
      <div class="hud-score">
        <span class="hud-label">SCORE</span>
        <span id="hudScore">0</span>
      </div>
      <div class="hud-timer" id="hudTimer">90</div>
      <div class="hud-words">
        <span class="hud-label">WORDS</span>
        <span id="hudWords">0</span>
      </div>
    </div>

    <div class="current-word" id="currentWord">&nbsp;</div>
    <div class="combo-badge hidden" id="comboBadge"></div>

    <div class="board-wrap">
      <svg class="trail" id="trail" preserveAspectRatio="none"></svg>
      <div class="board" id="board"></div>
    </div>

    <div class="toast" id="toast"></div>
    <p class="hint">Swipe across touching letters to make words ✨</p>
  </section>

  <!-- ============ RESULTS ============ -->
  <section id="screen-results" class="pscreen hidden">
    <div class="result-card glass">
      <div class="rank-big" id="rankBig">#1</div>
      <div class="avatar big" id="resultAvatar">🦊</div>
      <h2 id="resultName">You</h2>
      <div class="result-score" id="resultScore">0</div>
      <p class="result-sub" id="resultSub"></p>
      <div class="my-words" id="myWords"></div>
      <p class="result-wait">Look at the big screen for the winners! 🏆</p>
    </div>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="player.js"></script>
</body>
</html>
